<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <h1>REGISTRATION FORM</h1>

        <label for="Name">Name:
            <input type="text" id="txtname" required placeholder="Enter your full name here">
        </label><br><br>

        <label for="email">Email:
            <input type="email" id="txtemail" required placeholder="Enter your email here">
        </label><br><br>
        
        <label for="dob">Date of Birth:</label>
        <input type="date" name="dob" id="dob"><br><br>

        <label for="phone"> Phone number </label>
        <input type="tel" name="phone" id="phone" placeholder="Enter your phone number"><br>
         
        <p>select your gender<br>
        <label for="male">Male</label>
        <input type="radio" name="gender" id="male" value="male"><br>

        <label for="female">Female</label>
        <input type="radio" name="gender" id="female" value="female"><br>
    
        <label for="other">Other</label>
        <input type="radio" name="gender" id="other" value="other"><br>

        <label for="lesbian">lesbian</label>
        <input type="radio" name="gender" id="lesbian" value="lesbian"><br> <br>

        <label for="address">Your Address  </label><br>
        <textarea name="address" id="address" rows="5" cols="30"> </textarea><br>

      <button type="reset">Reset</button>
      <button type="submit">Submit</button>
        
    
    
    
    
    </form>
</body>
</html>
